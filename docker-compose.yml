version: "3.9"

services:
  harborx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: harborx
    restart: unless-stopped
    ports:
      - "18080:18080"
    env_file:
      - .env.example
    environment:
      HARBORX_DATA_DIR: /app/data
      HARBORX_DB_PATH: /app/data/harborx.sqlite
      HARBORX_WEB_DIST_DIR: /app/web-dist
    volumes:
      - ./data:/app/data
      - ./templates:/app/templates
